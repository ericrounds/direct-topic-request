<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submitting Story for Video...</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; color: #1f2937; }
  .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; max-width: 520px; text-align: center; }
  .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #16a34a; }
  h2 { margin: 0 0 12px; font-size: 22px; }
  p { color: #64748b; font-size: 15px; line-height: 1.5; margin: 8px 0; }
  .title { font-weight: 700; color: #0f172a; font-size: 16px; margin-top: 16px; }
  .meta { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="heading">Submitting story...</h2>
  <p id="message">Sending your selection for video production.</p>
  <div id="story-info"></div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var title = params.get('title') || 'Unknown';
  var url = params.get('url') || '';
  var source = params.get('source') || '';
  var category = params.get('category') || '';
  var social_hook = params.get('social_hook') || '';
  var blog_angle = params.get('blog_angle') || '';
  var why_it_matters = params.get('why_it_matters') || '';
  var summary = params.get('summary') || '';
  var date = params.get('date') || '';

  var esc = function(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

  document.getElementById('story-info').innerHTML =
    '<p class="title">' + esc(title) + '</p>' +
    '<p class="meta">' + esc(source) + (date ? ' \u00B7 ' + esc(date) : '') + '</p>';

  var webhookUrl = 'https://build.twin.so/triggers/c37921e7-4780-4cfe-9fbb-a099a1a662c0/webhook';

  var payload = {
    event: 'story.selected',
    story: {
      title: title,
      url: url,
      source: source,
      category: category,
      social_hook: social_hook,
      blog_angle: blog_angle,
      why_it_matters: why_it_matters,
      summary: summary,
      date: date
    },
    selected_at: new Date().toISOString()
  };

  var jsonStr = JSON.stringify(payload);
  var sent = false;

  // Method 1: navigator.sendBeacon — fire-and-forget, no CORS restrictions
  if (navigator.sendBeacon) {
    var blob = new Blob([jsonStr], { type: 'application/json' });
    sent = navigator.sendBeacon(webhookUrl, blob);
  }

  // Method 2: fetch with no-cors as fallback
  if (!sent) {
    fetch(webhookUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: jsonStr
    }).catch(function() {});
    sent = true;
  }

  // Show success immediately — this is fire-and-forget
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('heading').innerHTML = '\u2705 Story submitted for video production!';
  document.getElementById('heading').className = 'success';
  document.getElementById('message').textContent = 'The Topic Request & Script Writer agent will pick this up shortly. You can close this tab.';
})();
</script>
</body>
</html>
