<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make a Video About This Story</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; color: #1f2937; }
  .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; max-width: 520px; text-align: center; }
  h2 { margin: 0 0 8px; font-size: 20px; color: #64748b; font-weight: 400; }
  .story-title { font-weight: 700; color: #0f172a; font-size: 18px; line-height: 1.4; margin: 12px 0 4px; }
  .meta { font-size: 13px; color: #94a3b8; margin: 0 0 24px; }
  .btn-confirm { display: inline-block; background: #16a34a; color: white; padding: 12px 28px; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 12px; }
  .btn-confirm:hover { background: #15803d; }
  .btn-cancel { display: inline-block; color: #94a3b8; font-size: 14px; text-decoration: none; cursor: pointer; }
  .btn-cancel:hover { color: #64748b; }
  .success { color: #16a34a; }
  .result-msg { color: #64748b; font-size: 15px; line-height: 1.5; margin: 8px 0; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <div id="confirm-view">
    <h2>Would you like to make a video about:</h2>
    <p class="story-title" id="story-title"></p>
    <p class="meta" id="story-meta"></p>
    <div>
      <button class="btn-confirm" id="btn-yes">✅ Yes, make a video about this</button>
    </div>
    <div>
      <a class="btn-cancel" id="btn-cancel">Cancel</a>
    </div>
  </div>
  <div id="success-view" class="hidden">
    <h2 class="success" style="font-weight:700;font-size:22px;">✅ Submitted!</h2>
    <p class="result-msg">A script will be drafted and sent for your approval shortly.</p>
    <p class="story-title" id="success-title" style="font-size:15px;"></p>
  </div>
  <div id="cancel-view" class="hidden">
    <h2 style="font-size:18px;">No problem!</h2>
    <p class="result-msg">You can always submit a topic from the form instead.</p>
    <p><a href="https://ericrounds.github.io/direct-topic-request/" style="color:#2563eb;text-decoration:none;font-weight:600;">Submit a Topic Request</a></p>
  </div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var title = params.get('title') || 'Unknown';
  var url = params.get('url') || '';
  var source = params.get('source') || '';
  var category = params.get('category') || '';
  var social_hook = params.get('social_hook') || '';
  var blog_angle = params.get('blog_angle') || '';
  var why_it_matters = params.get('why_it_matters') || '';
  var summary = params.get('summary') || '';
  var date = params.get('date') || '';

  var esc = function(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  document.getElementById('story-title').innerHTML = esc(title);
  document.getElementById('story-meta').innerHTML = esc(source) + (date ? ' \u00B7 ' + esc(date) : '');
  document.getElementById('success-title').innerHTML = esc(title);

  document.getElementById('btn-yes').addEventListener('click', function() {
    var webhookUrl = 'https://build.twin.so/triggers/c37921e7-4780-4cfe-9fbb-a099a1a662c0/webhook';
    var payload = JSON.stringify({
      event: 'story.selected',
      story: { title: title, url: url, source: source, category: category, social_hook: social_hook, blog_angle: blog_angle, why_it_matters: why_it_matters, summary: summary, date: date },
      selected_at: new Date().toISOString()
    });
    if (navigator.sendBeacon) {
      navigator.sendBeacon(webhookUrl, new Blob([payload], { type: 'application/json' }));
    } else {
      fetch(webhookUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: payload }).catch(function(){});
    }
    document.getElementById('confirm-view').classList.add('hidden');
    document.getElementById('success-view').classList.remove('hidden');
  });

  document.getElementById('btn-cancel').addEventListener('click', function(e) {
    e.preventDefault();
    document.getElementById('confirm-view').classList.add('hidden');
    document.getElementById('cancel-view').classList.remove('hidden');
  });
})();
</script>
</body>
</html>
