<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Submitting Story for Video...</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f8fafc; color: #1f2937; }
  .card { background: white; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; max-width: 520px; text-align: center; }
  .spinner { width: 48px; height: 48px; border: 4px solid #e2e8f0; border-top-color: #7c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #16a34a; }
  .error { color: #dc2626; }
  h2 { margin: 0 0 12px; font-size: 22px; }
  p { color: #64748b; font-size: 15px; line-height: 1.5; margin: 8px 0; }
  .title { font-weight: 700; color: #0f172a; font-size: 16px; margin-top: 16px; }
  .meta { font-size: 13px; color: #94a3b8; }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h2 id="heading">Submitting story...</h2>
  <p id="message">Sending your selection for video production.</p>
  <div id="story-info"></div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var title = params.get('title') || 'Unknown';
  var url = params.get('url') || '';
  var source = params.get('source') || '';
  var category = params.get('category') || '';
  var social_hook = params.get('social_hook') || '';
  var blog_title = params.get('blog_title') || '';
  var blog_pitch = params.get('blog_pitch') || '';
  var why_it_matters = params.get('why_it_matters') || '';
  var date = params.get('date') || '';

  document.getElementById('story-info').innerHTML =
    '<p class="title">' + title.replace(/</g, '&lt;') + '</p>' +
    '<p class="meta">' + source.replace(/</g, '&lt;') + (date ? ' \u00B7 ' + date.replace(/</g, '&lt;') : '') + '</p>';

  var webhookUrl = 'https://build.twin.so/triggers/c37921e7-4780-4cfe-9fbb-a099a1a662c0/webhook';

  var payload = {
    event: 'story.selected',
    story: {
      title: title,
      url: url,
      source: source,
      category: category,
      social_hook: social_hook,
      blog_title: blog_title,
      blog_pitch: blog_pitch,
      why_it_matters: why_it_matters,
      date: date
    },
    selected_at: new Date().toISOString()
  };

  fetch(webhookUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(function(res) {
    document.getElementById('spinner').style.display = 'none';
    if (res.ok || res.status === 200 || res.status === 202 || res.status === 204) {
      document.getElementById('heading').innerHTML = '\u2705 Story submitted!';
      document.getElementById('heading').className = 'success';
      document.getElementById('message').textContent = 'This story has been sent for video production. You can close this tab.';
    } else {
      document.getElementById('heading').innerHTML = '\u26A0\uFE0F Submission received';
      document.getElementById('heading').className = 'success';
      document.getElementById('message').textContent = 'The request was sent (status: ' + res.status + '). You can close this tab.';
    }
  })
  .catch(function(err) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('heading').innerHTML = '\u274C Error';
    document.getElementById('heading').className = 'error';
    document.getElementById('message').textContent = 'Could not reach the server. Please try again or contact support.';
  });
})();
</script>
</body>
</html>
